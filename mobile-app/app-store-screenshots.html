<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TopBuilder App Store Screenshots</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #5d6678;
        --paper: #fffaf1;
        --line: #eadfce;
        --brand: #ffad24;
        --brand-dark: #f7941d;
        --canvas: #fbf7ef;
        --dark: #1e293b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--canvas);
      }
      .shot {
        width: 100vw;
        height: 100vh;
        padding: 96px 94px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 64px;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 173, 36, .24), transparent 34%),
          linear-gradient(145deg, #fffaf1 0%, #f5efe5 54%, #eef3f1 100%);
      }
      .top {
        display: grid;
        gap: 34px;
        max-width: 1040px;
      }
      .brand {
        display: flex;
        align-items: center;
        color: var(--brand-dark);
        font-weight: 900;
        font-size: 32px;
      }
      .brand img { width: 198px; height: 48px; object-fit: contain; }
      h1 {
        margin: 0;
        font-size: 76px;
        line-height: 1.05;
        letter-spacing: 0;
        max-width: 980px;
      }
      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 34px;
        line-height: 1.36;
        max-width: 900px;
        font-weight: 650;
      }
      .lower {
        min-height: 0;
        display: grid;
        place-items: end center;
      }
      .phone {
        width: 596px;
        height: 1288px;
        border: 16px solid var(--dark);
        border-radius: 78px;
        background: var(--canvas);
        box-shadow: 0 56px 120px rgba(17, 24, 39, .28);
        overflow: hidden;
        position: relative;
      }
      .phone::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 50%;
        width: 168px;
        height: 36px;
        transform: translateX(-50%);
        background: var(--dark);
        border-radius: 999px;
        z-index: 4;
      }
      .screen {
        width: 100%;
        height: 100%;
        padding: 46px 28px 126px;
        overflow: hidden;
        position: relative;
        display: grid;
        gap: 24px;
        background: #fbf8f2;
      }
      .screen-header {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .screen-brand {
        display: flex;
        align-items: center;
        color: var(--brand-dark);
        font-weight: 900;
        font-size: 18px;
      }
      .screen-brand img { width: 148px; height: 36px; object-fit: contain; }
      .pill {
        border-radius: 999px;
        background: white;
        padding: 12px 16px;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(17, 24, 39, .08);
      }
      .card {
        border-radius: 34px;
        background: white;
        box-shadow: 0 18px 42px rgba(17, 24, 39, .10);
        overflow: hidden;
      }
      .hero {
        background: #fff2d7;
        padding: 34px;
        display: grid;
        gap: 18px;
      }
      .eyebrow {
        color: var(--brand-dark);
        font-size: 16px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .screen h2 {
        margin: 0;
        font-size: 40px;
        line-height: 1.12;
        letter-spacing: 0;
      }
      .screen p {
        margin: 0;
        color: var(--muted);
        font-size: 22px;
        line-height: 1.44;
        font-weight: 650;
      }
      .button {
        height: 66px;
        border-radius: 999px;
        background: var(--brand);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 28px;
        font-size: 20px;
        font-weight: 900;
        width: fit-content;
      }
      .wide-img {
        width: 100%;
        height: 270px;
        object-fit: cover;
        border-radius: 30px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .tile {
        min-height: 136px;
        padding: 24px;
        border-radius: 28px;
        background: white;
        display: grid;
        align-content: space-between;
        box-shadow: 0 12px 30px rgba(17, 24, 39, .08);
        font-size: 22px;
        font-weight: 900;
      }
      .contractor {
        display: grid;
        gap: 18px;
        padding-bottom: 24px;
      }
      .contractor img { width: 100%; height: 272px; object-fit: cover; }
      .contractor-body { padding: 0 24px; display: grid; gap: 14px; }
      .between { display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; }
      .rating { color: var(--brand-dark); font-size: 22px; font-weight: 900; white-space: nowrap; }
      .tags { display: flex; flex-wrap: wrap; gap: 10px; }
      .tag { border-radius: 999px; background: #f7f3ed; padding: 9px 13px; color: var(--muted); font-size: 16px; font-weight: 800; }
      .article {
        display: grid;
        grid-template-columns: 164px 1fr;
        gap: 18px;
        padding: 18px;
        align-items: center;
      }
      .article img { width: 164px; height: 132px; border-radius: 26px; object-fit: cover; }
      .article h3 { margin: 0; font-size: 24px; line-height: 1.18; }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .stat {
        background: #f7f3ed;
        border-radius: 24px;
        padding: 18px;
      }
      .stat strong { display: block; font-size: 28px; }
      .stat span { color: var(--muted); font-size: 14px; font-weight: 800; }
      .bottom-nav {
        position: absolute;
        left: 30px;
        right: 30px;
        bottom: 24px;
        height: 82px;
        border-radius: 999px;
        background: white;
        box-shadow: 0 18px 42px rgba(17, 24, 39, .18);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        place-items: center;
        color: var(--muted);
        font-weight: 900;
        font-size: 14px;
      }
      .bottom-nav span.active { color: var(--brand-dark); }
      .ipad .shot {
        padding: 128px 128px;
        gap: 72px;
      }
      .ipad .lower {
        display: grid;
        grid-template-columns: 1.02fr .98fr;
        gap: 80px;
        align-items: center;
        place-items: center;
      }
      .ipad .top { max-width: 1500px; }
      .ipad h1 { font-size: 92px; max-width: 1350px; }
      .ipad .subtitle { font-size: 42px; max-width: 1250px; }
      .tablet {
        width: 980px;
        height: 1280px;
        border: 18px solid var(--dark);
        border-radius: 72px;
        background: #fbf8f2;
        box-shadow: 0 56px 130px rgba(17, 24, 39, .24);
        overflow: hidden;
        padding: 48px;
        display: grid;
        gap: 28px;
      }
      .ipad-copy {
        display: grid;
        gap: 30px;
        align-self: center;
      }
      .ipad-copy .mini {
        background: white;
        border-radius: 34px;
        padding: 30px;
        box-shadow: 0 16px 38px rgba(17, 24, 39, .09);
      }
      @media (max-height: 2000px) {
        .shot { padding: 70px 84px; gap: 36px; }
        h1 { font-size: 62px; }
        .subtitle { font-size: 29px; }
        .phone { width: 520px; height: 1124px; }
        .screen h2 { font-size: 34px; }
        .screen p { font-size: 19px; }
        .wide-img { height: 220px; }
      }
    </style>
  </head>
  <body>
    <script>
      const params = new URLSearchParams(location.search);
      const slide = Number(params.get("slide") || 1);
      const device = params.get("device") || "iphone";
      const root = document.documentElement;
      if (device === "ipad") root.classList.add("ipad");

      const slides = [
        {
          title: "Plan renovations with more confidence",
          subtitle: "Compare project types, see real renovation examples, and start with a clear next step.",
          screen: "home"
        },
        {
          title: "Compare local contractors in one place",
          subtitle: "Review specialties, project photos, ratings, and service coverage before starting a conversation.",
          screen: "contractors"
        },
        {
          title: "Use project stories to make smarter choices",
          subtitle: "Browse practical renovation guides, save ideas, and keep your planning organized.",
          screen: "community"
        }
      ];
      const current = slides[slide - 1] || slides[0];
      const img = {
        logo: "./assets/logo.png",
        hero: "./assets/hero-renovation.png",
        addition: "./assets/project-addition.png",
        basement: "./assets/project-basement.png",
        bathroom: "./assets/project-bathroom.png",
        commercial: "./assets/project-commercial.png",
        advisor: "./assets/advisor-portrait.png"
      };

      function header() {
        return `<div class="screen-header"><div class="screen-brand"><img src="${img.logo}" alt="TopBuilder"></div><div class="pill">◎ EN</div></div>`;
      }
      function nav(active) {
        return `<div class="bottom-nav"><span class="${active === "home" ? "active" : ""}">Home</span><span class="${active === "search" ? "active" : ""}">Search</span><span class="${active === "community" ? "active" : ""}">Community</span><span>Profile</span><span>Account</span></div>`;
      }
      function homeScreen() {
        return `<div class="screen">${header()}<section class="hero card"><span class="eyebrow">Contractor marketplace</span><h2>Complete renovation guidance and support</h2><p>Your trusted partner on the home improvement journey.</p><div class="button">Find contractors</div></section><img class="wide-img" src="${img.hero}" alt=""><div class="grid"><div class="tile">⌂<br>Home renovation</div><div class="tile">☕<br>Kitchen remodel</div><div class="tile">◌<br>Bathroom remodel</div><div class="tile">▤<br>Basement finish</div></div>${nav("home")}</div>`;
      }
      function contractorScreen() {
        return `<div class="screen">${header()}<section class="hero card"><span class="eyebrow">Search</span><h2>Find local professionals</h2><p>Filter by service, compare profiles, and contact the team that fits your project.</p></section><article class="contractor card"><img src="${img.bathroom}" alt=""><div class="contractor-body"><div class="between"><div><h2>M2 Tile & Stone</h2><p>Tile and stone specialist · Markham</p></div><span class="rating">★ 5.0</span></div><div class="tags"><span class="tag">Kitchen remodel</span><span class="tag">Bathroom remodel</span><span class="tag">Commercial project</span></div><div class="button">View profile</div></div></article><article class="contractor card"><img src="${img.addition}" alt=""><div class="contractor-body"><div class="between"><div><h2>Northline Build Co.</h2><p>Additions and structural renovation</p></div><span class="rating">★ 4.9</span></div></div></article>${nav("search")}</div>`;
      }
      function communityScreen() {
        return `<div class="screen">${header()}<section class="hero card"><span class="eyebrow">Community</span><h2>Renovation stories</h2><p>Read practical guides before you choose a contractor or finalize a scope.</p></section><article class="article card"><img src="${img.commercial}" alt=""><div><span class="eyebrow">Featured</span><h3>Cafe build-out checklist before opening</h3><p>5 min read · 1.8k views</p></div></article><article class="article card"><img src="${img.addition}" alt=""><div><span class="eyebrow">ADU</span><h3>How to plan an ADU that fits your property</h3><p>6 min read · 2.4k views</p></div></article><div class="stats"><div class="stat"><strong>200+</strong><span>Verified pros</span></div><div class="stat"><strong>4k+</strong><span>Reviews</span></div><div class="stat"><strong>1:1</strong><span>Support</span></div></div>${nav("community")}</div>`;
      }
      function phone() {
        const screen = current.screen === "home" ? homeScreen() : current.screen === "contractors" ? contractorScreen() : communityScreen();
        return `<div class="phone">${screen}</div>`;
      }
      function tablet() {
        const screen = current.screen === "home" ? homeScreen() : current.screen === "contractors" ? contractorScreen() : communityScreen();
        return `<div class="tablet">${screen.replace('class="screen"', 'class="screen" style="padding:0;height:100%"')}</div><div class="ipad-copy"><div class="mini"><span class="eyebrow">TopBuilder Home</span><h2>${current.title}</h2><p>${current.subtitle}</p></div><div class="mini"><h2>Built for planning</h2><p>Review contractors, save project ideas, and prepare clearer renovation conversations from one calm workspace.</p></div></div>`;
      }
      document.body.innerHTML = `<main class="shot"><section class="top"><div class="brand"><img src="${img.logo}" alt="TopBuilder"></div><h1>${current.title}</h1><p class="subtitle">${current.subtitle}</p></section><section class="lower">${device === "ipad" ? tablet() : phone()}</section></main>`;
    </script>
  </body>
</html>
